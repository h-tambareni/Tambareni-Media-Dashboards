<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <rect width="100" height="100" rx="8" fill="#080808"/>
  <!-- Minimalist chameleon silhouette - matching brand logo -->
  <g transform="translate(50,48) scale(0.7)" fill="#f5f2ed">
    <!-- Body - rounded shape -->
    <ellipse cx="0" cy="-8" rx="28" ry="24"/>
    <!-- Head - triangular/pointed -->
    <path d="M 20,-20 Q 35,-28 38,-18 Q 40,-12 30,-10 Z"/>
    <!-- Eye -->
    <circle cx="32" cy="-18" r="3" fill="#080808"/>
    <!-- Spiral tail -->
    <path d="M -20,8 Q -35,8 -38,0 Q -42,-10 -32,-14 Q -24,-16 -22,-10 Q -20,-4 -26,-2 Q -30,0 -28,4"
          fill="none" stroke="#f5f2ed" stroke-width="4" stroke-linecap="round"/>
    <!-- Front leg -->
    <path d="M 8,14 L 10,26 L 16,26" fill="none" stroke="#f5f2ed" stroke-width="4" stroke-linecap="round"/>
    <!-- Back leg -->
    <path d="M -8,14 L -10,26 L -4,26" fill="none" stroke="#f5f2ed" stroke-width="4" stroke-linecap="round"/>
    <!-- Crest/ridge on head -->
    <path d="M 10,-30 Q 18,-38 26,-30" fill="#f5f2ed"/>
  </g>
</svg>
