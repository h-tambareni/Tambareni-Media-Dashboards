<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo/cameleo-logo.png" />
    <title>Cameleo Studio</title>
    <meta name="description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta property="og:title" content="Cameleo Studio" />
    <meta property="og:description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta property="og:image" content="/logo/cameleo-logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cameleostudio.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cameleo Studio" />
    <meta name="twitter:description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta name="twitter:image" content="/logo/cameleo-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Ignore known-benign errors from dev HMR (React 18 + Recharts ResponsiveContainer emits
      // transient removeChild errors during hot reloads) and browser extensions.
      var IGNORE_RE = /metamask|wallet|ethereum|phantom|connect.*wallet|removeChild|NotFoundError|Failed to execute .*on .*Node/i;
      window.addEventListener('error', function(e) {
        var msg = String(e.message || (e.error && e.error.message) || '');
        if (IGNORE_RE.test(msg)) { console.warn('[ignored]', msg); return; }
        // Only blow away the root if React hasn't successfully rendered yet.
        var root = document.getElementById('root');
        if (!root || root.children.length > 0) return;
        root.innerHTML = '<div style="padding:24px;font-family:system-ui;background:#111;color:#f5f2ed;min-height:100vh"><h2 style="color:#d63031">Error</h2><pre>' + msg + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && (e.reason.message || e.reason)) || '';
        if (IGNORE_RE.test(String(msg))) { console.warn('[ignored]', msg); return; }
        var root = document.getElementById('root');
        if (!root || root.children.length > 0) return;
        root.innerHTML = '<div style="padding:24px;font-family:system-ui;background:#111;color:#f5f2ed;min-height:100vh"><h2 style="color:#d63031">Promise Error</h2><pre>' + msg + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
