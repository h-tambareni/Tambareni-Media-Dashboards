<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo/cameleo-logo.png" />
    <title>Cameleo Studio</title>
    <meta name="description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta property="og:title" content="Cameleo Studio" />
    <meta property="og:description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta property="og:image" content="/logo/cameleo-logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cameleostudio.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cameleo Studio" />
    <meta name="twitter:description" content="Cameleo Studio is a media and technology studio that systemizes AI content production to develop and promote apps." />
    <meta name="twitter:image" content="/logo/cameleo-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:system-ui;background:#111;color:#f5f2ed;min-height:100vh"><h2 style="color:#d63031">Error</h2><pre>' + (e.message || e) + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && (e.reason.message || e.reason)) || '';
        if (/metamask|wallet|ethereum|phantom|connect.*wallet/i.test(String(msg))) {
          console.warn('Ignored extension error:', msg);
          return;
        }
        document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:system-ui;background:#111;color:#f5f2ed;min-height:100vh"><h2 style="color:#d63031">Promise Error</h2><pre>' + msg + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
