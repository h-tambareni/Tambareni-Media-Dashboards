<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="64" height="64">
  <rect width="512" height="512" rx="64" fill="#080808"/>
  <!-- Chameleon silhouette matching brand logo: round body, spiral tail, pointed head -->
  <g transform="translate(256,240)" fill="#f5f2ed">
    <!-- Main body - large circle -->
    <circle cx="0" cy="0" r="110"/>
    <!-- Head - pointed/triangular extending right -->
    <path d="M 70,-60 Q 130,-100 155,-75 Q 170,-60 150,-40 L 80,-20 Z"/>
    <!-- Eye cutout -->
    <circle cx="135" cy="-65" r="14" fill="#080808"/>
    <!-- Spiral tail - curling inward from bottom-left -->
    <path d="M -80,70 Q -140,90 -155,50 Q -170,0 -135,-30 Q -105,-50 -85,-25 Q -65,-5 -90,10 Q -110,20 -105,40 Q -100,55 -85,50"
          fill="none" stroke="#f5f2ed" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Clean up tail connection to body -->
    <circle cx="-80" cy="70" r="16"/>
  </g>
</svg>
